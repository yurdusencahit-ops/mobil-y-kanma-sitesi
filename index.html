<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTO WASH | Premium Mobile Detailing</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
.hero { position: relative; height: 100vh; width: 100%; background: url('https://images.unsplash.com/photo-1544636331-e26879cd4d9b?q=80&w=1974&auto=format&fit=crop') no-repeat center center/cover; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1; }
.content { position: relative; z-index: 2; padding: 20px; }
h1 { font-size: 80px; font-weight: 700; letter-spacing: 10px; text-transform: uppercase; margin: 0; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
p.subtitle { font-size: 18px; letter-spacing: 5px; opacity: 0.8; margin-bottom: 30px; }
.cta-button { background: #007bff; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 18px; transition: 0.3s; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
.cta-button:hover { background: #0056b3; transform: scale(1.05); }
.selection-container { margin-top: 50px; display: flex; gap: 20px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
select { background: none; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; width: 250px; cursor: pointer; }

/* ASİSTAN STİLLERİ */
#asistan-container { position: fixed; bottom: 25px; right: 25px; z-index: 10000; }
#asistan-mesaj { display: none; background: #fff; color: #333; padding: 10px 15px; border-radius: 15px 15px 0 15px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 14px; animation: slideIn 0.5s ease; }
#asistan-panel { display: none; width: 300px; background: #1a1a1a; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 10px; border: 1px solid #333; }
.panel-header { background: #007bff; padding: 20px; color: white; }
.panel-body { padding: 15px; }
.panel-btn { width: 100%; background: #333; color: white; border: none; padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.3s; }
.panel-btn:hover { background: #444; }
#main-btn { background: #007bff; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,123,255,0.4); margin-left: auto; transition: 0.3s; }
#main-btn:hover { transform: rotate(15deg); }
@keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="hero">
<div class="content">
<h1>MOTOWASH</h1>
<p class="subtitle">PREMIUM MOBILE DETAILING</p>
<button class="cta-button">📍 KONUM AT GELELİM!</button>

<div class="selection-container">
<div>
<label style="display:block; font-size: 12px; margin-bottom: 5px; text-align: left;">HİZMET BÖLGESİ</label>
<select>
<option>Uzak Bölgeler (+350 TL)</option>
<option>Merkez Bölgeler</option>
</select>
</div>
<div>
<label style="display:block; font-size: 12px; margin-bottom: 5px; text-align: left;">ARAÇ SEGMENTİ</label>
<select>
<option>Luxury SUV / VIP</option>
<option>Binek / Sedan</option>
</select>
</div>
</div>
</div>
</div>

<div id="asistan-container">
<div id="asistan-mesaj">Size nasıl yardımcı olabilirim? ✨</div>

<div id="asistan-panel">
<div class="panel-header">
<h4 style="margin:0">MOTO WASH Asistan</h4>
<small>7/24 Yanınızdayız</small>
</div>
<div class="panel-body">
<button class="panel-btn" onclick="alert('Fiyatlar hesaplanıyor...')">💰 Fiyat Listesi</button>
<button class="panel-btn" onclick="alert('Randevu sistemine aktarılıyorsunuz...')">📅 Randevu Al</button>
<button class="panel-btn" style="background:#25d366" onclick="window.open('https://wa.me/numaraniz')">💬 WhatsApp Destek</button>
</div>
</div>

<button id="main-btn" onclick="toggleAsistan()">
<svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</button>
</div>

<script>
// Sayfa açıldıktan 3 saniye sonra mesajı göster
setTimeout(() => {
const mesaj = document.getElementById('asistan-mesaj');
if(document.getElementById('asistan-panel').style.display !== 'block') {
mesaj.style.display = 'block';
}
}, 3000);

function toggleAsistan() {
const panel = document.getElementById('asistan-panel');
const mesaj = document.getElementById('asistan-mesaj');

if (panel.style.display === 'none' || panel.style.display === '') {
panel.style.display = 'block';
mesaj.style.display = 'none';
} else {
panel.style.display = 'none';
}
}
</script>

</body>
</html>
