<style>
.clock {
width: 80px; height: 80px; /* Boyut küçültüldü */
border: 4px solid #1a1a1a; /* Siyah dış çerçeve */
border-radius: 50%;
position: relative;
margin: 0 auto;
background: white; /* Beyaz zemin */
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.clock::after {
content: ''; width: 4px; height: 4px; background: #ef4444; /* Kırmızı merkez nokta */
border-radius: 50%; position: absolute; top: 50%; left: 50%;
transform: translate(-50%, -50%); z-index: 10;
}
.hand {
position: absolute; bottom: 50%; left: 50%;
transform-origin: bottom; border-radius: 5px;
z-index: 5;
}
.hour-hand { width: 3px; height: 20px; background: #1a1a1a; } /* Siyah Akrep */
.min-hand { width: 2px; height: 28px; background: #1a1a1a; } /* Siyah Yelkovan */
.sec-hand { width: 1px; height: 32px; background: #ef4444; } /* Kırmızı Saniye */

/* Saat Rakamları (Paylaştığın görseldeki gibi siyah ve net) */
.number {
position: absolute; color: #1a1a1a;
font-size: 9px; font-weight: 900;
font-family: 'Inter', sans-serif;
}
.n1 { top: 8%; left: 68%; }
.n2 { top: 22%; left: 85%; }
.n3 { top: 42%; left: 90%; }
.n4 { top: 62%; left: 85%; }
.n5 { top: 78%; left: 68%; }
.n6 { top: 85%; left: 45%; }
.n7 { top: 78%; left: 22%; }
.n8 { top: 62%; left: 8%; }
.n9 { top: 42%; left: 4%; }
.n10 { top: 22%; left: 8%; }
.n11 { top: 8%; left: 22%; }
.n12 { top: 2%; left: 42%; }
</style>

<div class="clock">
<div class="number n1">1</div>
<div class="number n2">2</div>
<div class="number n3">3</div>
<div class="number n4">4</div>
<div class="number n5">5</div>
<div class="number n6">6</div>
<div class="number n7">7</div>
<div class="number n8">8</div>
<div class="number n9">9</div>
<div class="number n10">10</div>
<div class="number n11">11</div>
<div class="number n12">12</div>
<div class="hand hour-hand" id="hour-hand"></div>
<div class="hand min-hand" id="min-hand"></div>
<div class="hand sec-hand" id="sec-hand"></div>
</div>
