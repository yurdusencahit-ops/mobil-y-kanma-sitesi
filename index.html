<div id="smart-assistant" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-family: 'Georgia', serif;">

<div id="assistant-bubble" style="display: none; background: rgba(255, 255, 255, 0.95); color: #333; padding: 15px 20px; border-radius: 20px 20px 0 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 15px; width: 220px; position: relative; border: 1px solid #0077ff; backdrop-filter: blur(10px);">
<button onclick="closeBubble()" style="position: absolute; top: 5px; right: 8px; background: none; border: none; font-size: 14px; cursor: pointer; color: #999;">✕</button>
<p style="margin: 0; font-size: 13px; font-weight: bold; line-height: 1.4;">Bir sorunuz mu var? Size yardıma hazırız!</p>
</div>

<div onclick="toggleChatWindow()" style="cursor: pointer; position: relative; width: 80px; height: 80px; float: right;">
<div style="position: absolute; width: 100%; height: 100%; background: rgba(0, 119, 255, 0.3); border-radius: 50%; animate: pulse 2s infinite; z-index: -1;"></div>

<div style="width: 100%; height: 100%; border-radius: 50%; border: 3px solid #0077ff; overflow: hidden; background: #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.5);">
<img src="https://i.imgur.com/vHqB3K8.png" alt="Asistan" style="width: 100%; height: 100%; object-fit: cover;">
</div>

<div style="position: absolute; bottom: 5px; right: 5px; width: 15px; height: 15px; background: #22c55e; border-radius: 50%; border: 2px solid #fff;"></div>
</div>

<div id="assistant-window" style="display: none; position: absolute; bottom: 100px; right: 0; width: 300px; background: #050505; border: 1px solid #0077ff; border-radius: 25px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9); flex-direction: column;">
<div style="background: linear-gradient(135deg, #001f3f, #0a0a0a); padding: 20px; text-align: center; border-bottom: 1px solid #333;">
<div style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00c3ff; margin: 0 auto 10px; overflow: hidden;">
<img src="https://i.imgur.com/vHqB3K8.png" style="width: 100%; height: 100%; object-fit: cover;">
</div>
<h4 style="margin: 0; font-size: 16px; color: #fff; letter-spacing: 1px;">MotoWash Destek</h4>
<span style="font-size: 10px; color: #00c3ff; text-transform: uppercase;">Çevrimiçi</span>
</div>
<div style="padding: 20px; background: #111; display: flex; flex-direction: column; gap: 10px;">
<button onclick="window.open('https://wa.me/905307366945?text=Fiyatlar hakkında bilgi alabilir miyim?')" style="background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; cursor: pointer; text-align: left; font-size: 13px; transition: 0.3s;" onmouseover="this.style.borderColor='#00c3ff'">💰 Güncel Fiyat Listesi</button>
<button onclick="window.open('https://wa.me/905307366945?text=Konum gönderiyorum, ne zaman gelebilirsiniz?')" style="background: #0077ff; color: #fff; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 13px;">🟢 WhatsApp Randevu Al</button>
</div>
</div>
</div>

<script>
// Sayfa açıldıktan 3 saniye sonra balonu göster
setTimeout(() => {
document.getElementById('assistant-bubble').style.display = 'block';
}, 3000);

// Her 30 saniyede bir balonu tekrar hatırlat (eğer kapalıysa)
setInterval(() => {
const bubble = document.getElementById('assistant-bubble');
const win = document.getElementById('assistant-window');
if (win.style.display !== 'flex') {
bubble.style.display = 'block';
}
}, 30000);

function toggleChatWindow() {
const win = document.getElementById('assistant-window');
const bubble = document.getElementById('assistant-bubble');
if (win.style.display === 'none' || win.style.display === '') {
win.style.display = 'flex';
bubble.style.display = 'none';
} else {
win.style.display = 'none';
}
}

function closeBubble() {
document.getElementById('assistant-bubble').style.display = 'none';
}
</script>

<style>
@keyframes pulse {
0% { transform: scale(1); opacity: 0.6; }
50% { transform: scale(1.2); opacity: 0.3; }
100% { transform: scale(1); opacity: 0.6; }
}
</style>
