<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Wash Mobil</title>
<style>
/* --- CSS (TASARIM) BÖLÜMÜ --- */
body {
background-color: #121212;
color: white;
font-family: 'Segoe UI', Arial, sans-serif;
margin: 0;
display: flex;
flex-direction: column;
min-height: 100vh;
overflow-x: hidden;
}

/* Üst Bar: Takvim ve Saat */
.top-bar {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 20px;
z-index: 10;
}

/* Takvim (SOL) */
.calendar-widget {
background: white;
border-radius: 12px;
width: 100px;
text-align: center;
box-shadow: 0 8px 20px rgba(0,0,0,0.6);
overflow: hidden;
}

.calendar-widget .month {
background: #d90429;
color: white;
font-size: 14px;
font-weight: bold;
padding: 6px;
text-transform: uppercase;
}

.calendar-widget .day {
color: #2b2d42;
font-size: 40px;
font-weight: 800;
padding: 5px 0;
line-height: 1;
}

.calendar-widget .year {
color: #8d99ae;
font-size: 14px;
padding-bottom: 8px;
}

/* Dijital Saat (SAĞ) */
.clock-widget {
font-size: 42px;
font-weight: 900;
color: white;
text-shadow: 0 0 15px rgba(255,255,255,0.4);
padding-top: 5px;
}

/* Ana İçerik Alanı */
.main-content {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 20px;
}

/* Logo Yazısı */
.logo-text {
font-size: clamp(40px, 10vw, 70px);
font-style: italic;
font-weight: 900;
margin: 0 0 40px 0;
letter-spacing: -2px;
text-transform: uppercase;
}

.logo-text span {
color: #00b4d8;
}

/* Konum At Butonu */
.btn-location {
background: #007bff;
border: 4px solid white;
border-radius: 60px;
color: white;
text-decoration: none;
display: flex;
align-items: center;
justify-content: center;
width: 90%;
max-width: 400px;
padding: 20px;
box-shadow: 0 10px 30px rgba(0,123,255,0.4);
transition: transform 0.2s, background 0.3s;
}

.btn-location:active {
transform: scale(0.96);
}

.icon-map {
font-size: 40px;
margin-right: 20px;
}

.btn-text {
font-size: 24px;
font-weight: 900;
text-align: left;
line-height: 1.1;
}

/* Canlı Bildirim Kartı */
.live-status {
background: white;
color: #333;
width: 90%;
max-width: 400px;
margin-top: 50px;
padding: 15px;
border-radius: 18px;
display: flex;
align-items: center;
border-left: 8px solid #007bff;
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.status-icon {
background: #e7f0ff;
color: #007bff;
width: 35px;
height: 35px;
border-radius: 50%;
display: flex;
justify-content: center;
align-items: center;
font-weight: bold;
margin-right: 15px;
font-size: 20px;
}

.status-info p {
margin: 0;
font-weight: bold;
font-size: 16px;
}

.status-info span {
font-size: 12px;
color: #666;
text-transform: uppercase;
}
</style>
</head>
<body>

<header class="top-bar">
<div class="calendar-widget">
<div class="month">MART</div>
<div class="day">20</div>
<div class="year">2026</div>
</div>

<div class="clock-widget">
<span id="live-clock">00:00</span>
</div>
</header>

<main class="main-content">
<h1 class="logo-text">MOBIL<span>WASH</span></h1>

<a href="https://wa.me/905307366945" class="btn-location">
<div class="icon-map">📍</div>
<div class="btn-text">KONUM AT<br>GELELİM!</div>
</a>

<div class="live-status">
<div class="status-icon">✓</div>
<div class="status-info">
<p>Bakırköy'de bir Volvo yıkandı! ✅</p>
<span>AZ ÖNCE TAMAMLANDI</span>
</div>
</div>
</main>

<script>
/* --- JAVASCRIPT (FONKSİYON) BÖLÜMÜ --- */
function startLiveClock() {
const clockElement = document.getElementById('live-clock');

function update() {
const now = new Date();
const hours = String(now.getHours()).padStart(2, '0');
const minutes = String(now.getMinutes()).padStart(2, '0');

clockElement.textContent = hours + ":" + minutes;
}

// Her 1 saniyede bir saati güncelle
setInterval(update, 1000);
update(); // Sayfa açıldığında hemen göster
}

// Sayfa tamamen yüklendiğinde saati başlat
window.onload = startLiveClock;
</script>

</body>
</html>
