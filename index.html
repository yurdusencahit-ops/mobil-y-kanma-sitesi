<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossgo | VIP Mobil Operasyon</title>
<style>
/* Tasarımı bozmamak için tüm CSS sabit tutuldu */
:root { --gold: #FFD700; --bg: #050505; --card: #111111; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: #fff; font-family: sans-serif; }

/* ARKA PLAN RESİM DÜZELTMESİ */
.bg-animate {
position: fixed; width: 100vw; height: 100vh; z-index: -1;
background-size: cover; background-position: center;
/* Hata veren imgbb linkleri yerine çalışan Unsplash linkleri eklendi */
animation: sliderChange 15s infinite ease-in-out;
filter: brightness(0.4); /* Yazıların okunması için hafif karartma */
}

@keyframes sliderChange {
0%, 33% { background-image: url('https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?q=80&w=1920'); } /* Yıkama yapan eleman temsili */
34%, 66% { background-image: url('https://images.unsplash.com/photo-1607860108855-64acf2078ed9?q=80&w=1920'); } /* Buharlı detay temizlik */
67%, 100% { background-image: url('https://images.unsplash.com/photo-1552933529-e359b2477252?q=80&w=1920'); } /* Parlayan lüks araç */
}

header { padding: 20px 5%; display: flex; justify-content: space-between; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 100; }
.main-dashboard { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; padding: 40px 5%; }
.card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 30px; margin-bottom: 20px; }
.btn-select { background: var(--gold); color: #000; padding: 12px; display: block; text-align: center; font-weight: bold; text-decoration: none; border-radius: 8px; }
.op-panel { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; }
.log-item { padding: 10px 0; border-bottom: 1px solid #222; font-size: 13px; }
.log-item span { color: var(--gold); }
</style>
</head>
<body>

<div class="bg-animate"></div>

<header>
<div style="font-size: 24px; font-weight: bold; color: var(--gold);">GLOSSGO</div>
<div style="color: var(--gold); font-weight: bold;">0530 736 69 45</div>
</header>

<div class="main-dashboard">
<div>
<h2 style="margin-bottom: 20px; border-left: 4px solid var(--gold); padding-left: 10px;">VIP Paketler</h2>
<div class="card">
<h3 style="color: var(--gold);">FORZA-TOUCH</h3>
<p style="font-size: 28px; margin: 10px 0;">1.450 TL</p>
<p style="color: #888; font-size: 14px; margin-bottom: 15px;">İç-Dış & Nano Cila Detaylı Temizlik</p>
<a href="https://wa.me/905307366945" class="btn-select">RANDEVU AL</a>
</div>
</div>

<div class="op-panel">
<h3 style="margin-bottom: 15px;">Canlı Operasyonlar</h3>
<div id="log-container">
</div>
</div>
</div>

<script>
const locations = ["Etiler", "Bebek", "Nişantaşı", "Ulus", "Tarabya", "Florya", "Göktürk"];
const actions = ["iç temizliği yapıldı", "buharlı temizleniyor", "detaylı parlatıldı"];

function addLog() {
const logContainer = document.getElementById('log-container');
const loc = locations[Math.floor(Math.random() * locations.length)];
const act = actions[Math.floor(Math.random() * actions.length)];
const html = `<div class="log-item">📍 <span>${loc}'de</span> bir araç ${act}.</div>`;
logContainer.insertAdjacentHTML('afterbegin', html);
if(logContainer.children.length > 5) logContainer.lastElementChild.remove();
}
setInterval(addLog, 5000); addLog();
</script>

</body>
</html>
