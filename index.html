<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossgo Mobil Oto Yıkama | İstanbul VIP Temizlik</title>
<style>
/* --- SENİN ORİJİNAL SİYAH-SARI TEMAN --- */
:root {
--bg-color: #121212;
--acc-color: #FFD700;
--text-color: #FFFFFF;
--sub-text: #E0E0E0;
--card-bg: #1E1E1E;
}

body {
font-family: 'Poppins', sans-serif;
margin: 0; padding: 0;
background-color: var(--bg-color); color: var(--text-color);
overflow-x: hidden;
}

header {
background-color: rgba(18, 18, 18, 0.95);
padding: 20px 50px; position: fixed; width: 100%; top: 0; z-index: 1000;
display: flex; justify-content: space-between; align-items: center;
border-bottom: 2px solid var(--acc-color);
}

/* --- HAREKETLİ ARKA PLAN BURADA --- */
.hero {
height: 100vh; display: flex; align-items: center; padding: 0 10%;
background-size: cover; background-position: center; position: relative;
animation: slideImages 15s infinite; /* Resimler burada dönecek */
}

.hero::before {
content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.6); z-index: 1;
}

@keyframes slideImages {
0%, 33% { background-image: url('https://images.unsplash.com/photo-1603510825319-a9c15ed99683?w=1920'); }
34%, 66% { background-image: url('https://images.unsplash.com/photo-1552933529-e359b2477252?w=1920'); }
67%, 100% { background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=1920'); }
}

.hero-content { z-index: 2; max-width: 600px; }
.hero-content h1 { font-size: 48px; margin-bottom: 20px; }
.hero-content h1 span { color: var(--acc-color); }

.btn {
display: inline-block; padding: 15px 30px;
background: var(--acc-color); color: #000;
font-weight: bold; border-radius: 5px; text-decoration: none;
}

/* --- BİLDİRİM BALONU --- */
.bot-container { position: fixed; bottom: 30px; right: 30px; z-index: 1001; }
.notif {
background: #fff; color: #000; padding: 12px 20px; border-radius: 20px 20px 0 20px;
margin-bottom: 10px; display: none; border-left: 4px solid var(--acc-color); font-size: 14px;
}
.avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--acc-color); overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<header>
<div style="font-size: 24px; font-weight: bold; color: var(--acc-color);">GLOSSGO</div>
<div style="font-weight: bold;">0530 736 69 45</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>Siz Kahvenizi İçin,<br>Biz Aracınızı <span>Parlatalım.</span></h1>
<p>İstanbul'un lüks semtlerinde kapınızda VIP araç temizliği.</p>
<a href="tel:05307366945" class="btn">RANDEVU AL</a>
</div>
</section>

<div class="bot-container">
<div id="notif-box" class="notif"></div>
<div class="avatar"><img src="https://i.ibb.co/vz6WvR8/customer-service.png"></div>
</div>

<script>
const msgs = [
"📍 <b>Etiler'de</b> bir Range Rover yıkandı!",
"📍 <b>Bebek'te</b> bir Porsche parlatıldı!",
"📍 <b>Ataşehir'de</b> Mercedes S-Serisi temizlendi!"
];
let i = 0;
function show() {
const box = document.getElementById('notif-box');
box.innerHTML = msgs[i];
box.style.display = 'block';
setTimeout(() => { box.style.display = 'none'; i = (i + 1) % msgs.length; }, 4000);
}
setInterval(show, 8000);
</script>
</body>
</html>
