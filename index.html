<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoWash İstanbul | Mobil Lüks Araç Temizliği</title>
<style>
/* GENEL TASARIM */
body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* PREMIUM SLIDER */
.slider-container { width: 100%; height: 500px; position: relative; overflow: hidden; border-bottom: 3px solid #004e92; }
.slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; background-size: cover; background-position: center; }
.slide.active { opacity: 1; }
.slide-overlay { background: rgba(0,0,0,0.5); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
.slide-overlay h2 { font-size: 3rem; text-transform: uppercase; margin: 0; color: #004e92; text-shadow: 2px 2px 10px #000; }

/* ANALOG SAAT */
.clock-container { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 50%; border: 2px solid #004e92; }
#clock { width: 100px; height: 100px; border: 2px solid #fff; border-radius: 50%; position: relative; }
.hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: #fff; border-radius: 5px; }
.hour { width: 4px; height: 30px; }
.minute { width: 3px; height: 40px; }
.second { width: 2px; height: 45px; background: #ff0000; }

/* HESAPLAMA MOTORU */
.calculator { background: #111; padding: 30px; border-radius: 15px; margin-top: 50px; border: 1px solid #333; }
.calculator h3 { color: #004e92; margin-top: 0; }
select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: none; font-size: 1rem; }
select { background: #222; color: #fff; }
button { background: #004e92; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { background: #003366; }
#total-price { font-size: 1.5rem; text-align: center; color: #25d366; margin-top: 10px; }
</style>
</head>
<body>

<div class="slider-container">
<div class="clock-container">
<div id="clock">
<div id="hour" class="hand hour"></div>
<div id="min" class="hand minute"></div>
<div id="sec" class="hand second"></div>
</div>
</div>

<div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?q=80&w=1920');">
<div class="slide-overlay">
<h2>Lüks Araç Detaylı Temizlik</h2>
<p>İstanbul'un Her Yerinde Mobil Hizmet</p>
</div>
</div>
<div class="slide" style="background-image: url('https://images.unsplash.com/photo-1607860108855-64acf2078ed9?q=80&w=1920');">
<div class="slide-overlay">
<h2>Seramik Kaplama Uzmanlığı</h2>
<p>Aracınız İlk Günkü Gibi Parlasın</p>
</div>
</div>
</div>

<div class="container">
<div class="calculator">
<h3>Fiyatını Hesapla & Randevu Al</h3>
<label>Araç Tipi:</label>
<select id="carType">
<option value="500">Sedan / Hatchback</option>
<option value="750">SUV / Jeep</option>
<option value="1000">Lüks Spor Araç</option>
</select>

<label>Ek Hizmetler:</label>
<select id="serviceType">
<option value="0">Sadece Yıkama</option>
<option value="500">Detaylı İç Temizlik (+500 TL)</option>
<option value="1000">Pasta Cila (+1000 TL)</option>
<option value="2500">Tam Paket (+2500 TL)</option>
</select>

<button onclick="calculate()">HESAPLA</button>
<div id="total-price">Tahmini Tutar: 500 TL</div>
</div>
</div>

<div id="ai-assistant" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; font-family: sans-serif;">
<div id="ai-chat-window" style="display: none; width: 320px; height: 450px; background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); flex-direction: column; overflow: hidden; margin-bottom: 15px; border: 1px solid #eee;">
<div style="background: linear-gradient(135deg, #004e92, #000428); color: white; padding: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
<div>
<div style="font-size: 16px;">MotoWash Asistan</div>
<div style="font-size: 11px; font-weight: normal; opacity: 0.8;">● Çevrimiçi</div>
</div>
<button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size: 20px;">✕</button>
</div>
<div id="chat-content" style="flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9;">
<div style="background: #fff; padding: 12px; border-radius: 15px 15px 15px 0; margin-bottom: 15px; color: #333; font-size: 14px;">
Merhaba! 🚗 Size nasıl yardımcı olabilirim?
</div>
<div style="display: flex; flex-direction: column; gap: 8px;">
<button onclick="aiReply('fiyat')" style="background: #fff; border: 1px solid #004e92; color: #004e92; padding: 10px; border-radius: 10px; cursor: pointer; text-align: left;">💰 Fiyat Listesi</button>
<button onclick="aiReply('konum')" style="background: #fff; border: 1px solid #004e92; color: #004e92; padding: 10px; border-radius: 10px; cursor: pointer; text-align: left;">📍 Konum</button>
<button onclick="window.open('https://wa.me/905XXXXXXXXX')" style="background: #25d366; border: none; color: white; padding: 10px; border-radius: 10px; cursor: pointer; text-align: left; font-weight: bold;">🟢 WhatsApp Randevu</button>
</div>
</div>
</div>
<button onclick="toggleChat()" style="background: linear-gradient(135deg, #004e92, #000428); width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;">
<svg viewBox="0 0 24 24" width="32" height="32" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</button>
</div>

<script>
// SLIDER DÖNGÜSÜ
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');
setInterval(() => {
slides[currentSlide].classList.remove('active');
currentSlide = (currentSlide + 1) % slides.length;
slides[currentSlide].classList.add('active');
}, 5000);

// ANALOG SAAT ÇALIŞTIRMA
setInterval(() => {
const now = new Date();
document.getElementById('hour').style.transform = `rotate(${now.getHours() * 30 + now.getMinutes() / 2}deg)`;
document.getElementById('min').style.transform = `rotate(${now.getMinutes() * 6}deg)`;
document.getElementById('sec').style.transform = `rotate(${now.getSeconds() * 6}deg)`;
}, 1000);

// FİYAT HESAPLAMA
function calculate() {
const base = parseInt(document.getElementById('carType').value);
const extra = parseInt(document.getElementById('serviceType').value);
document.getElementById('total-price').innerText = "Tahmini Tutar: " + (base + extra) + " TL";
}

// ASİSTAN FONKSİYONLARI
function toggleChat() {
const win = document.getElementById('ai-chat-window');
win.style.display = win.style.display === 'none' ? 'flex' : 'none';
}

function aiReply(type) {
const content = document.getElementById('chat-content');
let msg = type === 'fiyat' ? "🚗 Standart: 500TL, VIP: 1500TL'den başlar." : "📍 İstanbul her yerindeyiz! Mobil ekibimiz kapınıza gelir.";
const div = document.createElement('div');
div.style.cssText = "background: #e3f2fd; padding: 12px; border-radius: 15px 15px 0 15px; margin-top: 10px; color: #333; font-size: 14px;";
div.innerHTML = msg;
content.appendChild(div);
content.scrollTop = content.scrollHeight;
}
</script>
</body>
</html>
