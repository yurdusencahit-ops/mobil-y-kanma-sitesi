<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossgo Mobil Oto Yıkama | İstanbul VIP Temizlik</title>
<style>
/* --- GLOSSGO PREMİUM TEMASI --- */
:root {
--bg-color: #121212;
--acc-color: #FFD700;
--text-color: #FFFFFF;
--sub-text: #E0E0E0;
--card-bg: #1E1E1E;
--notif-bg: #FFFFFF;
}

body {
font-family: 'Poppins', 'Segoe UI', sans-serif;
margin: 0; padding: 0;
background-color: var(--bg-color); color: var(--text-color);
overflow-x: hidden; scroll-behavior: smooth;
}

header {
background-color: rgba(18, 18, 18, 0.95);
padding: 20px 50px; position: fixed; width: 100%; top: 0; z-index: 1000;
display: flex; justify-content: space-between; align-items: center;
border-bottom: 2px solid var(--acc-color); box-sizing: border-box;
}
.logo { font-size: 28px; font-weight: bold; color: var(--acc-color); letter-spacing: 2px; }

/* --- HAREKETLİ ARKA PLAN (HERO) --- */
.hero {
height: 100vh; display: flex; align-items: center; padding: 0 10%;
background-size: cover; background-position: center; position: relative; margin-top: 80px;
/* BURASI RESİMLERİ DEĞİŞTİREN KISIM */
animation: sliderChange 12s infinite ease-in-out;
transition: background-image 1.5s ease-in-out;
}

@keyframes sliderChange {
0%, 33% { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1603510825319-a9c15ed99683?w=1920'); }
34%, 66% { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1552933529-e359b2477252?w=1920'); }
67%, 100% { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=1920'); }
}

.hero-content { z-index: 2; max-width: 600px; }
.hero-content h1 { font-size: 48px; margin-bottom: 20px; }
.hero-content h1 span { color: var(--acc-color); }

.btn {
display: inline-block; padding: 12px 25px;
background: var(--acc-color); color: var(--bg-color);
font-weight: bold; border-radius: 5px; text-transform: uppercase;
}

/* --- PAKETLER & BİLDİRİMLER (AYNEN KORUNDU) --- */
.packages { padding: 80px 10%; text-align: center; }
.package-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
.card { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 280px; border: 1px solid #333; }
.card h3 { color: var(--acc-color); }
.price { font-size: 28px; font-weight: bold; margin: 15px 0; }

.bot-container { position: fixed; bottom: 30px; right: 30px; z-index: 1001; }
.notification-bubble {
background: var(--notif-bg); color: #333; padding: 12px 20px; border-radius: 20px 20px 0 20px;
margin-bottom: 10px; display: none; border-left: 4px solid var(--acc-color);
}
.bot-avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--acc-color); overflow: hidden; }
.bot-avatar img { width: 100%; height: 100%; object-fit: cover; }

@media (max-width: 768px) { .hero-content h1 { font-size: 32px; } }
</style>
</head>
<body>

<header>
<div class="logo">GLOSSGO</div>
<div style="color: var(--acc-color); font-weight: bold;">0530 736 69 45</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>Siz Kahvenizi İçin,<br>Biz Aracınızı <span>Parlatalım</span>.</h1>
<p>İstanbul'un lüks semtlerinde kapınızda VIP araç temizliği.</p>
<a href="tel:05307366945" class="btn">Randevu Al</a>
</div>
</section>

<section class="packages">
<h2 style="margin-bottom:40px;">Hizmet Paketlerimiz</h2>
<div class="package-container">
<div class="card">
<h3>FORZA-TOUCH</h3>
<div class="price">1.450 TL</div>
<p>Premium İç-Dış & Hızlı Cila</p>
</div>
<div class="card" style="border-color: var(--acc-color);">
<h3>ELITE-SHINE</h3>
<div class="price">2.850 TL</div>
<p>VIP Buharlı Sterilizasyon</p>
</div>
</div>
</section>

<div class="bot-container">
<div id="bubble" class="notification-bubble"></div>
<div class="bot-avatar">
<img src="https://i.ibb.co/vz6WvR8/customer-service.png" alt="Glossgo Asistan">
</div>
</div>

<script>
const notifications = [
"📍 <b>Etiler'de</b> bir Range Rover yıkandı!",
"📍 <b>Bebek'te</b> bir Porsche parlatıldı!",
"📍 <b>Ataşehir'de</b> Mercedes S-Serisi temizlendi!"
];
let index = 0;
function showNotification() {
const bubble = document.getElementById('bubble');
bubble.innerHTML = notifications[index];
bubble.style.display = 'block';
setTimeout(() => { bubble.style.display = 'none'; index = (index + 1) % notifications.length; }, 4000);
}
setInterval(showNotification, 8000);
</script>

</body>
</html>
