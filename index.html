<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Wash Mobil | Gold Edition VIP</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
--gold: #d4af37;
--dark-gold: #aa841e;
--premium-black: #0a0a0a;
}

body { background-color: var(--premium-black); font-family: 'Georgia', serif; overflow-x: hidden; }

.gold-text {
background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa841e);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.gold-border {
border: 2px solid transparent;
border-image: linear-gradient(to right, #bf953f, #fcf6ba, #aa841e);
border-image-slice: 1;
}

.gold-button {
background: linear-gradient(45deg, #bf953f, #fcf6ba, #aa841e);
color: black;
font-weight: 900;
transition: all 0.3s ease;
}

.gold-button:hover {
box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
transform: scale(1.02);
}

.header-widget {
backdrop-filter: blur(10px);
background: rgba(255, 255, 255, 0.05);
border: 1px solid rgba(212, 175, 55, 0.3);
}

.slider-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
.slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 2s; background-size: cover; background-position: center; }
.slide.active { opacity: 0.4; }

/* YENİ: Otomatik VIP Yazı Bildirim Stili (Şerit değil, küçük bir bildirim) */
#vip-notification {
position: fixed;
bottom: 20px;
right: 20px;
background: rgba(212, 175, 55, 0.15);
border: 1px solid var(--gold);
color: var(--gold);
padding: 15px 25px;
border-radius: 15px;
font-size: 13px;
font-weight: bold;
opacity: 0;
transform: translateY(20px);
transition: opacity 0.5s, transform 0.5s;
z-index: 100;
backdrop-filter: blur(5px);
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
#vip-notification.show {
opacity: 1;
transform: translateY(0);
}
</style>
</head>
<body class="text-white">

<div id="vip-notification">
</div>

<header class="flex justify-between items-start p-6 md:p-10 relative z-20">
<div class="header-widget rounded-2xl p-4 text-center w-24 border-b-4 border-[#d4af37]">
<div id="cal-month" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">MART</div>
<div id="cal-day" class="text-3xl font-black gold-text">21</div>
<div class="text-[9px] text-gray-500 font-bold">2026</div>
</div>

<div class="header-widget rounded-2xl px-6 py-4 text-right border-r-4 border-[#d4af37]">
<div id="digital-clock" class="text-4xl font-black gold-text tracking-tighter">00:00</div>
<div class="text-[9px] font-bold text-gray-500 uppercase tracking-[3px]">VIP Servis</div>
</div>
</header>

<main class="relative h-[60vh] flex flex-col items-center justify-center text-center px-4">
<div class="slider-container">
<div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=1500');"></div>
<div class="slide" style="background-image: url('https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?q=80&w=1500');"></div>
</div>

<h1 class="text-6xl md:text-9xl font-black italic tracking-tighter uppercase mb-4">
MOTO<span class="gold-text">WASH</span>
</h1>
<p class="text-gray-400 tracking-[10px] uppercase text-xs mb-10">Ultra Premium Detailing</p>

<div id="gece-uyari" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-6 py-2 rounded-full text-[10px] font-bold animate-pulse mb-6">
🌙 GECE TARİFESİ AKTİF
</div>

<button onclick="konumAt()" class="gold-button px-10 py-6 rounded-full text-xl flex items-center gap-4 shadow-2xl">
<i class="fas fa-map-marker-alt"></i> KONUM AT GELELİM!
</button>
</main>

<script>
function updateClock() {
const now = new Date();
document.getElementById('digital-clock').innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
const months = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
document.getElementById('cal-month').innerText = months[now.getMonth()];
document.getElementById('cal-day').innerText = now.getDate();
}
setInterval(updateClock, 1000); updateClock();

let sIdx = 0; const slides = document.querySelectorAll('.slide');
setInterval(() => { slides[sIdx].classList.remove('active'); sIdx = (sIdx + 1) % slides.length; slides[sIdx].classList.add('active'); }, 5000);

function konumAt() {
window.open(`https://wa.me/905307366945?text=Merhaba, konumumu paylaşıyorum. Servis bekliyorum.`, '_blank');
}

// --- YENİ YAZILIM: OTOMATİK VIP BİLDİRİM SİSTEMİ ---
const vipMessages = [
"Beşiktaş otoparkında lüks araç teslim edildi.",
"Nişantaşı rezidansında premium hizmet tamamlandı.",
"Ulus'ta showroom parlaklığı kapınıza geldi.",
"Zekeriyaköy'de detaylı iç temizlik bitti.",
"Etiler ofisinizde VIP paket uygulandı.", // Etiler yazısı kalktı, genel VIP bir hale geldi
"Sarıyer'de yerinde profesyonel detailing yapıldı.",
"Bahçeşehir'de bir lüks araç showroom parlaklığına ulaştı."
];

const notificationEl = document.getElementById('vip-notification');

function showNextVipMessage() {
// Rastgele bir mesaj seç
const randomMsg = vipMessages[Math.floor(Math.random() * vipMessages.length)];
notificationEl.innerText = randomMsg;

// Bildirimi göster
notificationEl.classList.add('show');

// 5 saniye sonra gizle
setTimeout(() => {
notificationEl.classList.remove('show');
}, 5000);
}

// Sayfa yüklendikten 3 saniye sonra başla, her 15 saniyede bir yeni mesaj göster
setTimeout(showNextVipMessage, 3000);
setInterval(showNextVipMessage, 15000);

</script>
</body>
</html>
