<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOSSGO | VIP Mobil Detailing</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root { --gold: #FFD700; --whatsapp: #25D366; --bg-dark: rgba(0,0,0,0.85); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

/* SİLİNEN ARKA PLAN RESİMLERİ VE HAREKETLİ SLIDER GERİ GELDİ */
.bg-video-container {
position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
background: url('https://images.unsplash.com/photo-1603510825319-a9c15ed99683?q=80&w=1920') no-repeat center center/cover;
filter: brightness(0.4); animation: zoomEffect 20s infinite alternate;
}
@keyframes zoomEffect { from { transform: scale(1); } to { transform: scale(1.1); } }

header {
padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000;
}
.logo { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold); font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

.container { max-width: 1400px; margin: auto; padding: 40px 5%; }

/* GİDER PUSULASI BANDI - NET VE KURUMSAL */
.legal-banner {
background: rgba(255,215,0,0.15); border: 1px solid var(--gold); padding: 20px;
border-radius: 15px; margin-bottom: 40px; backdrop-filter: blur(10px);
text-align: center; font-weight: 800; color: var(--gold); text-transform: uppercase;
}

.main-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 40px; }

/* KARTLARDAKİ YAZI NETLİĞİ ARTIRILDI */
.card {
background: var(--bg-dark); border: 1px solid #333; border-radius: 25px; padding: 35px;
margin-bottom: 30px; backdrop-filter: blur(15px); position: relative; overflow: hidden;
box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.card h3 { color: var(--gold); font-size: 24px; margin-bottom: 10px; text-shadow: 1px 1px 2px #000; }
.price { font-size: 40px; font-weight: 900; color: #fff; margin: 15px 0; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

/* BUTONLARIN ESKİ CANLI RENKLERİ */
.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
.btn {
padding: 18px; border-radius: 12px; font-weight: 900; text-align: center;
text-decoration: none; text-transform: uppercase; border: none; cursor: pointer;
}
.btn-yellow { background: #FFCC00; color: #000; box-shadow: 0 5px 15px rgba(255,204,0,0.3); }
.btn-green { background: var(--whatsapp); color: #fff; box-shadow: 0 5px 15px rgba(37,211,102,0.3); }

/* VIP FORM - BEYAZ VE NET */
.form-box { background: #fff; color: #000; padding: 40px; border-radius: 30px; margin-top: 40px; }
.form-box h2 { text-align: center; color: #000; margin-bottom: 30px; font-weight: 900; }
.form-group label { display: block; margin-bottom: 10px; font-weight: 800; color: #333; font-size: 14px; }
.form-group input, .form-group select {
width: 100%; padding: 16px; border: 2px solid #eee; border-radius: 12px;
font-size: 16px; font-weight: 700; margin-bottom: 20px;
}

/* CANLI AKIŞ PANELİ */
.op-center {
background: rgba(10,10,10,0.95); border: 1px solid var(--gold); padding: 30px;
border-radius: 30px; height: fit-content; position: sticky; top: 120px;
}
.log-item { border-bottom: 1px solid #222; padding: 15px 0; font-size: 14px; display: flex; justify-content: space-between; }
.log-item b { color: var(--gold); }

@media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="bg-video-container"></div>

<header>
<div class="logo">GLOSSGO</div>
<a href="tel:05307366945" class="btn btn-yellow" style="padding: 10px 20px; font-size: 12px;">0530 736 69 45</a>
</header>

<div class="container">
<div class="legal-banner">
<i class="fas fa-file-invoice-dollar"></i>
Kurumsal İşlemlerinizde Gider Pusulası Kesilmektedir
</div>

<div class="main-grid">
<div>
<div class="card">
<h3>GLOSS-LIGHT</h3>
<span class="price">950 TL</span>
<p>Dış Yıkama, Jant Bakımı ve Lastik Parlatma</p>
<div class="btn-group">
<a href="#randevu" class="btn btn-yellow">RANDEVU AL</a>
<a href="#" class="btn btn-green">KONUM AT</a>
</div>
</div>

<div class="card" style="border: 2px solid var(--gold);">
<h3>FORZA-TOUCH</h3>
<span class="price">1.450 TL</span>
<p>İç-Dış Detaylı Temizlik + Nano Cila Koruma</p>
<div class="btn-group">
<a href="#randevu" class="btn btn-yellow">RANDEVU AL</a>
<a href="#" class="btn btn-green">KONUM AT</a>
</div>
</div>

<div class="form-box" id="randevu">
<h2>VIP RANDEVU TALEBİ</h2>
<form>
<div class="form-group">
<label>ARAÇ MARKASI</label>
<select>
<option>PORSCHE</option>
<option>MERCEDES-BENZ</option>
<option>BMW</option>
<option>AUDI</option>
</select>
</div>
<button type="submit" class="btn btn-yellow" style="width: 100%; font-size: 18px;">RANDEVU OLUŞTUR</button>
</form>
</div>
</div>

<div class="op-center">
<h3 style="color:var(--gold); margin-bottom: 20px;">CANLI OPERASYON</h3>
<div id="live-logs"></div>
</div>
</div>
</div>

<script>
const semtler = ["Etiler", "Bebek", "Zekeriyaköy", "Maslak", "Acarkent"];
function addLog() {
const list = document.getElementById('live-logs');
const s = semtler[Math.floor(Math.random()*semtler.length)];
list.insertAdjacentHTML('afterbegin', `<div class="log-item">📍 <b>${s}</b> / Ekip Yola Çıktı <span style="color:#00ff00">●</span></div>`);
if(list.children.length > 8) list.lastElementChild.remove();
}
setInterval(addLog, 5000); addLog();
</script>
</body>
</html>
