<path d="M12 2C6.477 2 2 6.477 2 12c0 1.891.527 3.66 1.438 5.168L2 22l4.832-1.438C8.34 21.473 10.109 22 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18c-1.657 0-3.21-.462-4.532-1.264l-.325-.198-2.83.842.842-2.83-.198-.325A7.957 7.957 0 014 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.589 8-8 8z"/>

<button style="width: 100%; background: #333; color: white; border: none; padding: 10px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; text-align: left;">🧼 Detaylı Temizlik</button>

</div>
</div>

<script>
// Sayfa açıldıktan 3 saniye sonra mesaj baloncuğunu göster
setTimeout(() => {
document.getElementById('asistan-mesaj').style.display = 'block';
}, 3000);

function toggleAsistan() {
const panel = document.getElementById('asistan-panel');
const mesaj = document.getElementById('asistan-mesaj');

if (panel.style.display === 'none') {
panel.style.display = 'block';
mesaj.style.display = 'none'; // Panel açılınca balonu gizle
} else {
panel.style.display = 'none';
}
}
</script>
