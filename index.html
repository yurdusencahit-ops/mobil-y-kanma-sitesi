<html lang="tr">
<head>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
:root { --gold: #d4af37; --bg: #050505; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; scroll-behavior: smooth; overflow-x: hidden; }

/* --- SADELEŞTİRİLMİŞ CAM EFEKTİ --- */
.glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 1.5rem; transition: 0.4s ease; }
.glass:hover { border-color: var(--gold); background: rgba(255, 255, 255, 0.05); }

/* --- ARKA PLAN SİSTEMİ --- */
.hero-bg { position: absolute; inset: 0; z-index: -1; }
.slide { position: absolute; inset: 0; opacity: 0; transition: opacity 2s; background-size: cover; background-position: center; filter: brightness(0.3); }
.slide.active { opacity: 1; }

/* --- ANALOG SAAT & TAKVİM --- */
.clock { width: 90px; height: 90px; border: 2px solid var(--gold); border-radius: 50%; position: relative; background: rgba(0,0,0,0.5); }
.hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
.h-h { width: 4px; height: 22px; background: white; }
.m-h { width: 2px; height: 32px; background: var(--gold); }
.s-h { width: 1px; height: 35px; background: #ff4d4d; }

/* --- BİLDİRİM PANELİ --- */
#notif { position: fixed; bottom: 30px; left: -450px; z-index: 1000; transition: 0.7s; }
#notif.active { left: 30px; }

/* --- BUTONLAR --- */
.btn-gold { background: var(--gold); color: black; font-weight: 800; transition: 0.3s; }
.btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); }
.btn-wa { background: #25D366; color: white; font-weight: 800; transition: 0.3s; }
</style>
</head>
<body>

<div id="notif" class="glass p-5 flex items-center gap-4 border-l-4 border-gold shadow-2xl">
<div class="text-gold"><i class="fas fa-check-circle text-2xl"></i></div>
<div>
<p id="notif-txt" class="text-xs font-bold text-white italic"></p>
<p class="text-[8px] text-amber-500 font-black uppercase tracking-widest mt-1">Hizmet Tamamlandı</p>
</div>
</div>

<header class="relative h-screen flex flex-col items-center justify-center px-6">
<div class="hero-bg">
<div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?q=80&w=2000');"></div>
<div class="slide" style="background-image: url('https://images.unsplash.com/photo-1607860108855-64acf2078ed9?q=80&w=2000');"></div>
</div>

<nav class="absolute top-0 w-full flex justify-between items-center p-8 z-50">
<div class="glass px-6 py-3 text-center border-l-4 border-gold shadow-xl">
<div class="text-3xl font-black text-gold leading-none" id="cal-d">20</div>
<div class="text-[9px] font-black uppercase tracking-widest mt-1" id="cal-m">MART</div>
</div>
<div class="clock shadow-xl">

<div id="m-h" class="hand m-h"></div>
<div id="s-h" class="hand s-h"></div>
</div>
</nav>

MOTO<span class="text-gold">WASH</span>

<button onclick="whatsapp('Konum')" class="btn-gold px-12 py-5 rounded-2xl text-[10px] uppercase tracking-widest shadow-2xl">
<i class="fas fa-location-dot mr-2"></i> Konum At Gelelim

<a href="#booking" class="glass px-12 py-5 rounded-2xl text-[10px] uppercase tracking-widest font-black border-white/10 hover:border-gold transition flex items-center">
Hizmet Paketleri

<h2 class="text-2xl font-black italic mb-8 uppercase text-gold tracking-widest leading-none">Hızlı Seçim</h2>
<div class="grid md:grid-cols-2 gap-6">

<option value="0">Merkezi İlçeler (Ücretsiz)</option>
<option value="350">Uzak Bölgeler (+350 TL)</option>
</select>
</div>
</div>
<div class="mt-12 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6">
<div class="text-center md:text-left leading-none">
<span class="text-slate-500 font-bold uppercase text-[9px] tracking-widest block mb-2">Net Vip Paket Fiyatı:</span>

</div>

</footer>

<script>
// ANALOG SAAT MOTORU
function tick() {
const now = new Date();
const h = now.getHours(); const m = now.getMinutes(); const s = now.getSeconds();
document.getElementById('h-h').style.transform = `translateX(-50%) rotate(${(h % 12) * 30 + m/2}deg)`;
document.getElementById('m-h').style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
document.getElementById('s-h').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
const aylar = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
document.getElementById('cal-m').innerText = aylar[now.getMonth()];
document.getElementById('cal-d').innerText = now.getDate();
}
setInterval(tick, 1000); tick();

// SLIDER (ARKA PLAN)
let sIdx = 0; const slides = document.querySelectorAll('.slide');
setInterval(() => { slides[sIdx].classList.remove('active'); sIdx = (sIdx + 1) % slides.length; slides[sIdx].classList.add('active'); }, 7000);

// CANLI BİLDİRİM (SOSYAL KANIT)
const yerler = ["Etiler", "Florya", "Nişantaşı", "Ataşehir", "Sarıyer", "Suadiye"];
const oto = ["Mercedes", "Porsche", "BMW", "Range Rover", "Audi"];
function notify() {
const y = yerler[Math.floor(Math.random()*yerler.length)];
const o = oto[Math.floor(Math.random()*oto.length)];
document.getElementById('notif-txt').innerText = `${y} bölgesinde bir ${o} parlatıldı! ✨`;
const n = document.getElementById('notif');
n.classList.add('active');
setTimeout(() => n.classList.remove('active'), 7000);
}
setInterval(notify, 45000); setTimeout(notify, 5000);

// FİYAT GÜNCELLEME
const base = { binek: 2300, suv: 2950 };
function upd() {
const c = document.getElementById('car').value;
const b = parseInt(document.getElementById('loc').value);
const hr = new Date().getHours();
let m = (hr >= 21 || hr < 7) ? 1.30 : 1;
document.getElementById('price').innerHTML = `${Math.round(base[c]*m+b)}<span class='text-xl text-gold ml-1 italic'>TL</span>`;
}
upd();

// WHATSAPP KARŞILAMA SİSTEMİ
function whatsapp(tip) {
const msg = `Merhaba MotoWash Hoşgeldiniz! 👋%0Anasıl yardımcı olabilirim?%0A%0A(Mobil stüdyonuzdan randevu almak istiyorum.)`;
window.open(`https://wa.me/905307366945?text=${msg}`, '_blank');
}
</script>
