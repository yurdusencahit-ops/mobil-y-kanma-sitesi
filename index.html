<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Wash Mobil | Gold Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* Altın Gradyan ve Özel Fontlar */
:root {
--gold: #d4af37;
--dark-gold: #aa841e;
--premium-black: #0a0a0a;
}

body { background-color: var(--premium-black); font-family: 'Georgia', serif; }

.gold-text {
background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa841e);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.gold-border {
border: 2px solid transparent;
border-image: linear-gradient(to right, #bf953f, #fcf6ba, #aa841e);
border-image-slice: 1;
}

.gold-button {
background: linear-gradient(45deg, #bf953f, #fcf6ba, #aa841e);
color: black;
font-weight: 900;
transition: all 0.3s ease;
}

.gold-button:hover {
box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
transform: scale(1.02);
}

/* Saat ve Takvim Yerleşimi */
.header-widget {
backdrop-filter: blur(10px);
background: rgba(255, 255, 255, 0.05);
border: 1px solid rgba(212, 175, 55, 0.3);
}

/* Arka Plan Slider */
.slider-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
.slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 2s; background-size: cover; background-position: center; }
.slide.active { opacity: 0.4; }
</style>
</head>
<body class="text-white">

<header class="flex justify-between items-start p-6 md:p-10 relative z-20">
<div class="header-widget rounded-2xl p-4 text-center w-24 border-b-4 border-[#d4af37]">
<div id="cal-month" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">MART</div>
<div id="cal-day" class="text-3xl font-black gold-text">21</div>
<div class="text-[9px] text-gray-500 font-bold">2026</div>
</div>

<div class="header-widget rounded-2xl px-6 py-4 text-right border-r-4 border-[#d4af37]">
<div id="digital-clock" class="text-4xl font-black gold-text tracking-tighter">00:00</div>
<div class="text-[9px] font-bold text-gray-500 uppercase tracking-[3px]">VIP Servis</div>
</div>
</header>

<main class="relative h-[60vh] flex flex-col items-center justify-center text-center px-4">
<div class="slider-container">
<div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=1500');"></div>
<div class="slide" style="background-image: url('https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?q=80&w=1500');"></div>
</div>

<h1 class="text-6xl md:text-9xl font-black italic tracking-tighter uppercase mb-4">
MOTO<span class="gold-text">WASH</span>
</h1>
<p class="text-gray-400 tracking-[10px] uppercase text-xs mb-10">Ultra Premium Detailing</p>

<div id="gece-uyari" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-6 py-2 rounded-full text-[10px] font-bold animate-pulse mb-6">
🌙 GECE TARİFESİ AKTİF
</div>

<button onclick="konumAt()" class="gold-button px-10 py-6 rounded-full text-xl flex items-center gap-4 shadow-2xl">
<i class="fas fa-map-marker-alt"></i> KONUM AT GELELİM!
</button>
</main>

<section class="max-w-4xl mx-auto -mt-10 mb-20 px-6 relative z-30">
<div class="bg-[#111] p-8 rounded-[3rem] gold-border shadow-2xl">
<div class="grid md:grid-cols-2 gap-8">
<div>
<label class="block text-[10px] text-gray-500 uppercase font-bold mb-3 tracking-widest">Hizmet Bölgesi</label>
<select id="bolge" onchange="hesapla()" class="w-full bg-black border border-gray-800 p-4 rounded-2xl text-white font-bold focus:border-[#d4af37] outline-none">
<option value="0">Merkezi Bölgeler</option>
<option value="350">Uzak Bölgeler (+350 TL)</option>
</select>
</div>
<div>
<label class="block text-[10px] text-gray-500 uppercase font-bold mb-3 tracking-widest">Araç Tipi</label>
<select id="arac" onchange="hesapla()" class="w-full bg-black border border-gray-800 p-4 rounded-2xl text-white font-bold focus:border-[#d4af37] outline-none">
<option value="binek">Premium Binek</option>
<option value="suv">Luxury SUV / VIP</option>
</select>
</div>
</div>
</div>
</section>

<section class="max-w-6xl mx-auto grid md:grid-cols-3 gap-8 px-6 mb-24">
<div class="bg-[#111] p-10 rounded-[2rem] border-t-4 border-gray-800 text-center hover:border-[#d4af37] transition duration-500">
<h3 class="text-xl font-bold mb-2">Silver Detay</h3>
<div class="text-4xl font-black gold-text mb-8"><span id="price-standart">950</span> TL</div>
<button onclick="whatsapp('Silver')" class="w-full py-4 rounded-xl border border-[#d4af37] text-[#d4af37] font-bold hover:bg-[#d4af37] hover:text-black transition">RANDEVU</button>
</div>
<div class="bg-black p-10 rounded-[2.5rem] gold-border text-center transform scale-110 shadow-[0_0_40px_rgba(212,175,55,0.2)]">
<div class="gold-button text-[9px] py-1 px-4 rounded-full inline-block mb-4 text-black">EN ÇOK TERCİH EDİLEN</div>
<h3 class="text-2xl font-bold mb-2 gold-text">GOLD VIP</h3>
<div class="text-5xl font-black gold-text mb-8"><span id="price-vip">1600</span> TL</div>
<button onclick="whatsapp('Gold VIP')" class="gold-button w-full py-4 rounded-xl shadow-lg">WHATSAPP RANDEVU</button>
</div>
<div class="bg-[#111] p-10 rounded-[2rem] border-t-4 border-gray-800 text-center hover:border-[#d4af37] transition duration-500">
<h3 class="text-xl font-bold mb-2">Platinum</h3>
<div class="text-4xl font-black gold-text mb-8"><span id="price-ultra">2400</span> TL</div>
<button onclick="whatsapp('Platinum')" class="w-full py-4 rounded-xl border border-[#d4af37] text-[#d4af37] font-bold hover:bg-[#d4af37] hover:text-black transition">RANDEVU</button>
</div>
</section>

<footer class="bg-black py-20 text-center border-t border-gray-900">
<div class="flex justify-center gap-10 mb-10">
<a href="https://www.instagram.com/mericyurdusen" class="text-4xl gold-text"><i class="fab fa-instagram"></i></a>
<a href="https://wa.me/905307366945" class="text-4xl text-green-600"><i class="fab fa-whatsapp"></i></a>
</div>
<p class="text-[10px] tracking-[5px] text-gray-600 font-bold uppercase italic">© 2026 MERIC YURDUŞEN | MOTO WASH MOBIL</p>
</footer>

<script>
function updateClock() {
const now = new Date();
document.getElementById('digital-clock').innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
const months = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
document.getElementById('cal-month').innerText = months[now.getMonth()];
document.getElementById('cal-day').innerText = now.getDate();
}
setInterval(updateClock, 1000); updateClock();

let sIdx = 0; const slides = document.querySelectorAll('.slide');
setInterval(() => { slides[sIdx].classList.remove('active'); sIdx = (sIdx + 1) % slides.length; slides[sIdx].classList.add('active'); }, 5000);

const prices = { binek: { s: 950, v: 1600, u: 2400 }, suv: { s: 1250, v: 1950, u: 2900 } };
function hesapla() {
const a = document.getElementById('arac').value;
const b = parseInt(document.getElementById('bolge').value);
const h = new Date().getHours();
let m = (h >= 21 || h < 7) ? 1.3 : 1;
h >= 21 || h < 7 ? document.getElementById('gece-uyari').classList.remove('hidden') : document.getElementById('gece-uyari').classList.add('hidden');
document.getElementById('price-standart').innerText = Math.round(prices[a].s * m + b);
document.getElementById('price-vip').innerText = Math.round(prices[a].v * m + b);
document.getElementById('price-ultra').innerText = Math.round(prices[a].u * m + b);
}

function whatsapp(p) {
const a = document.getElementById('arac').options[document.getElementById('arac').selectedIndex].text;
const msg = `Merhaba, ${p} için randevu oluşturmak istiyorum. Araç: ${a}`;
window.open(`https://wa.me/905307366945?text=${msg}`, '_blank');
}

function konumAt() {
window.open(`https://wa.me/905307366945?text=Merhaba, konumumu paylaşıyorum. Araç yıkama için bekliyorum.`, '_blank');
}
hesapla();
</script>
</body>
</html>
